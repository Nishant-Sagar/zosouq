services:
  - type: web
    name: zosouq-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard from Neon
      - key: ADMIN_SECRET
        generateValue: true  # Render auto-generates a secure random string
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel frontend URL after deploy
    healthCheckPath: /
